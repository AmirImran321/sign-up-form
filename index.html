<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="left-container">
        <img src="neida.jpg" alt="Neida">
        <div class="photo-credit">Stargazing</div>
        <p>Photo by <a href="https://unsplash.com/@neida?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">neida zarate</a> on <a href="https://unsplash.com/photos/mountain-under-blue-sky-tKkcPKULeVQ?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
      </p>
    </div>
    <div class="right-container">
        <p>This is not real online service! You know you need something like this in your life to help realize your deepest dreams. Sign up now to get started.</p>
        <p>You know you want to.</p>
        <div class="sign">
            <label for="fname">First Name</label>
            <input type="text" id="fname">
            <label for="lname">Last Name</label>
            <input type="text" id="lname">
            <label for="email">Email</label>
            <input type="email" id="email">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone">
            <label for="password">Password</label>
            <input type="password" id="password">
            <label for="cpassword">Confirm Password</label>
            <input type="password" id="cpassword">
        </div>
        <button>Create Account</button>
        <p>Already have an account? Log in <a href="login.html"> here.</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
